services:
  - type: web
    name: denorecords-electronics
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn bora_electronics.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
